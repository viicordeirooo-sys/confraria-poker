const { useState, useEffect } = React;

const KEY      = "poker-live-v2";
const HIST_KEY = "poker-mahau-historico";

function loadHistorico() {
  try { const v = localStorage.getItem(HIST_KEY); return v ? JSON.parse(v) : []; } catch { return []; }
}
function saveHistorico(h) { try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch {} }
function loadMesa() {
  try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; } catch { return null; }
}
function saveMesa(data) {
  try {
    if (data === null) localStorage.removeItem(KEY);
    else localStorage.setItem(KEY, JSON.stringify(data));
  } catch {}
}

const fmtBRL = v => `R$ ${Number(v || 0).toLocaleString("pt-BR")}`;
const uid    = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const FORMAS = ["Pix", "Dinheiro", "Maquininha"];
const BUYINS = [300, 500, 1000];
const REBUYS = [300, 500, 1000, 1500, 2000];

function calcularAcertos(jogadores, cashouts) {
  const balances = jogadores.map(j => {
    const totalPago = (j.buyin || 0) + j.rebuys.reduce((s, r) => s + r.valor, 0);
    return { id: j.id, nome: j.nome, saldo: Number(cashouts[j.id] || 0) - totalPago };
  });
  const cred = balances.filter(b => b.saldo >  0.5).map(b => ({...b})).sort((a,b) => b.saldo - a.saldo);
  const dev  = balances.filter(b => b.saldo < -0.5).map(b => ({...b})).sort((a,b) => a.saldo - b.saldo);
  const txs  = [];
  let ci = 0, di = 0;
  while (ci < cred.length && di < dev.length) {
    const val = Math.min(cred[ci].saldo, -dev[di].saldo);
    if (val > 0.5) txs.push({ id: uid(), de: dev[di].nome, para: cred[ci].nome, valor: Math.round(val), pago: false, forma: "Pix" });
    cred[ci].saldo -= val; dev[di].saldo += val;
    if (cred[ci].saldo < 0.5) ci++;
    if (dev[di].saldo > -0.5) di++;
  }
  return txs;
}

function exportarExcel(mesa) {
  if (typeof XLSX === "undefined") throw new Error("XLSX não carregado");
  const rows = mesa.jogadores.map(j => {
    const totalRebuy = j.rebuys.reduce((s, r) => s + r.valor, 0);
    const totalPago  = (j.buyin || 0) + totalRebuy;
    const cashout    = mesa.cashouts ? Number(mesa.cashouts[j.id] || 0) : "";
    const resultado  = mesa.cashouts ? cashout - totalPago : "";
    return {
      "Jogador": j.nome, "Buy-in (R$)": j.buyin || 0, "Forma Buy-in": j.buyinForma || "—",
      "Total Rebuy (R$)": totalRebuy, "Qtd Rebuys": j.rebuys.length,
      "Total Pago (R$)": totalPago, "Cashout (R$)": cashout, "Resultado (R$)": resultado,
    };
  });
  const totalBuyin = mesa.jogadores.reduce((s,j) => s+(j.buyin||0), 0);
  const totalRebuy = mesa.jogadores.reduce((s,j) => s+j.rebuys.reduce((sr,r)=>sr+r.valor,0), 0);
  const rake       = mesa.rake || { percent: 0, caixinha: 0 };
  const totalGeral = totalBuyin + totalRebuy;
  const rakeValor  = Math.round(totalGeral * rake.percent / 100);
  rows.push({ "Jogador": "TOTAL", "Buy-in (R$)": totalBuyin, "Forma Buy-in": "", "Total Rebuy (R$)": totalRebuy, "Qtd Rebuys": "", "Total Pago (R$)": totalGeral, "Cashout (R$)": "", "Resultado (R$)": "" });
  if (rake.percent > 0)  rows.push({ "Jogador": `Rake ${rake.percent}%`, "Buy-in (R$)": rakeValor, "Forma Buy-in": "", "Total Rebuy (R$)": "", "Qtd Rebuys": "", "Total Pago (R$)": "", "Cashout (R$)": "", "Resultado (R$)": "" });
  if (rake.caixinha > 0) rows.push({ "Jogador": "Caixinha", "Buy-in (R$)": rake.caixinha, "Forma Buy-in": "", "Total Rebuy (R$)": "", "Qtd Rebuys": "", "Total Pago (R$)": "", "Cashout (R$)": "", "Resultado (R$)": "" });
  if (mesa.acertos && mesa.acertos.length > 0) {
    rows.push({ "Jogador": "── ACERTOS ──" });
    mesa.acertos.forEach(a => rows.push({ "Jogador": `${a.de} → ${a.para}`, "Buy-in (R$)": a.valor, "Forma Buy-in": a.forma, "Total Rebuy (R$)": "", "Qtd Rebuys": a.pago ? "PAGO" : "PENDENTE" }));
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [22,13,14,16,11,15,13,15].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Controle Mesa");
  XLSX.writeFile(wb, `PokerMahau_${(mesa.data||"").replace(/\//g,"-")}.xlsx`);
}

  .acerto-badge { font-size: 8px; color: #5ABB5A; letter-spacing: 1px; }

  /* ── histórico ── */
  .tab-bar { display: flex; border-bottom: 1px solid #1E4020; flex-shrink: 0; }
  .tab { flex: 1; padding: 8px; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    text-align: center; cursor: pointer; color: #4A7A4A; border-bottom: 2px solid transparent; }
  .tab.active { color: #C9A84C; border-bottom-color: #C9A84C; }
  .hist-block { border-bottom: 1px solid #1E4020; padding-bottom: 14px; margin-bottom: 14px; }
  .hist-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: baseline; }
  .hist-date { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #F0D080; letter-spacing: 1px; }
  .hist-total { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #C9A84C; letter-spacing: 1px; }
  .hist-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 8px; }
  .hist-cell { background: #091509; border: 1px solid #1E4020; padding: 6px 8px; }
  .hist-cell-lbl { font-size: 7px; color: #4A7A4A; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .hist-cell-val { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: #F0D080; }
  .hist-res-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .hist-res-nome { font-size: 10px; color: #E8DFC0; }
  .hist-res-val { font-family: 'Bebas Neue', sans-serif; font-size: 13px; }
  .hist-res-val.pos { color: #5ABB5A; }
  .hist-res-val.neg { color: #CC4444; }

  /* ── jogador stats ── */
  .jogador-stat { border-bottom: 1px solid #1E4020; padding-bottom: 12px; margin-bottom: 12px; }
  .jogador-stat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .jogador-stat-nome { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #F0D080; letter-spacing: 1px; }
  .jogador-stat-res { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; }
  .jogador-stat-res.pos { color: #5ABB5A; }
  .jogador-stat-res.neg { color: #CC4444; }
  .jogador-stat-res.zero { color: #7A7A7A; }

  /* ── misc ── */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; padding: 40px;
    color: #2E4A2E; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .empty-state span { font-size: 40px; }

  .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: #1A3020; border: 1px solid #C9A84C; color: #F0D080;
    font-size: 11px; letter-spacing: 1px; padding: 10px 20px; z-index: 999;
    border-radius: 2px; white-space: nowrap; animation: pop .2s ease; pointer-events: none; }
  @keyframes pop { from { transform: translateX(-50%) scale(.9); opacity:0; }
                   to   { transform: translateX(-50%) scale(1); opacity:1; } }

  .confirm-modal { position: fixed; top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,.92);
    display: flex; align-items: center; justify-content: center; z-index: 300; padding: 24px; }
  .confirm-box { background: #0D200F; border: 1px solid #CC4444;
    padding: 28px 24px; width: 100%; max-width: 320px;
    display: flex; flex-direction: column; gap: 16px; text-align: center; }
  .confirm-icon { font-size: 32px; }
  .confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #CC4444; letter-spacing: 2px; }
  .confirm-name { font-size: 13px; color: #F0D080; letter-spacing: 1px; }
  .confirm-sub { font-size: 9px; color: #4A7A4A; letter-spacing: 1px; text-transform: uppercase; }
  .confirm-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  input[type=number]::-webkit-inner-spin-button { opacity: .4; }
`;

function App() {
  const [mesa, setMesa]               = useState(null);
  const [loading, setLoading]         = useState(true);
  const [expanded, setExpanded]       = useState(null);
  const [addName, setAddName]         = useState("");
  const [toast, setToast]             = useState(null);
  const [historico, setHistorico]     = useState([]);
  const [showHist, setShowHist]       = useState(false);
  const [histTab, setHistTab]         = useState("mesas");
  const [confirmRemove, setConfirmRemove]     = useState(null);
  const [confirmNovaMesa, setConfirmNovaMesa] = useState(false);

  const [setupData, setSetupData] = useState({
    data: new Date().toLocaleDateString("pt-BR"),
    rakePercent: "5",
    caixinha: "0",
  });

  // painel jogador
  const [rebuyVal, setRebuyVal]           = useState("");
  const [rebuyForma, setRebuyForma]       = useState("Pix");
  const [buyinForma, setBuyinForma]       = useState("Pix");
  const [customBuyin, setCustomBuyin]     = useState("");
  const [selectedBuyin, setSelectedBuyin] = useState(null);

  // encerrar: 0=fechado 1=cashout 2=resultados+acertos
  const [encStep, setEncStep]   = useState(0);
  const [cashouts, setCashouts] = useState({});
  const [acertos, setAcertos]   = useState([]);

  useEffect(() => {
    const d = loadMesa();
    if (d) setMesa(d);
    setHistorico(loadHistorico());
    setLoading(false);
  }, []);

  const persist   = m => { setMesa(m); saveMesa(m); };
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  const iniciarMesa = () => {
    persist({
      id: uid(),
      data: setupData.data,
      rake: { percent: Number(setupData.rakePercent) || 0, caixinha: Number(setupData.caixinha) || 0 },
      jogadores: [],
    });
    showToast("Mesa iniciada ✓");
  };

  const novaMesa = () => {
    persist(null);
    setEncStep(0);
    setConfirmNovaMesa(false);
    setExpanded(null);
    setSetupData({ data: new Date().toLocaleDateString("pt-BR"), rakePercent: "5", caixinha: "0" });
    showToast("Mesa encerrada");
  };

  const addJogador = () => {
    const nome = addName.trim(); if (!nome) return;
    const j = { id: uid(), nome, buyin: 0, buyinForma: "Pix", rebuys: [] };
    persist({ ...mesa, jogadores: [...mesa.jogadores, j] });
    setAddName(""); setExpanded(j.id);
    setSelectedBuyin(null); setCustomBuyin(""); setBuyinForma("Pix");
  };

  const confirmarBuyin = jId => {
    const val = selectedBuyin === "custom" ? Number(customBuyin) : selectedBuyin;
    if (!val) return;
    persist({ ...mesa, jogadores: mesa.jogadores.map(j =>
      j.id !== jId ? j : { ...j, buyin: val, buyinForma }
    )});
    showToast(`Buy-in ${fmtBRL(val)} · ${buyinForma} ✓`);
    setSelectedBuyin(null); setCustomBuyin("");
  };

  const addRebuy = jId => {
    const val = Number(rebuyVal); if (!val) return;
    persist({ ...mesa, jogadores: mesa.jogadores.map(j =>
      j.id !== jId ? j : { ...j, rebuys: [...j.rebuys, { id: uid(), valor: val, forma: rebuyForma }] }
    )});
    setRebuyVal(""); showToast(`Rebuy ${fmtBRL(val)} · ${rebuyForma} ✓`);
  };

  const remJogador = jId => {
    const j = mesa.jogadores.find(j => j.id === jId);
    setConfirmRemove({ id: jId, nome: j ? j.nome : "este jogador" });
  };
  const confirmarRemocao = () => {
    persist({ ...mesa, jogadores: mesa.jogadores.filter(j => j.id !== confirmRemove.id) });
    if (expanded === confirmRemove.id) setExpanded(null);
    setConfirmRemove(null); showToast("Jogador removido");
  };

  // derived
  const rake        = mesa?.rake || { percent: 0, caixinha: 0 };
  const totalGeral  = mesa ? mesa.jogadores.reduce((s,j) => s+(j.buyin||0)+j.rebuys.reduce((sr,r)=>sr+r.valor,0), 0) : 0;
  const rakeValor   = Math.round(totalGeral * rake.percent / 100);
  const caixinhaVal = rake.caixinha || 0;
  const potLiquido  = totalGeral - rakeValor - caixinhaVal;
  const numJog      = mesa ? mesa.jogadores.length : 0;
  const totalCO     = Object.values(cashouts).reduce((s,v) => s+Number(v||0), 0);
  const diffCO      = totalCO - potLiquido;

  const abrirEncerrar = () => {
    const init = {};
    (mesa.jogadores || []).forEach(j => { init[j.id] = ""; });
    setCashouts(init); setAcertos([]); setEncStep(1);
  };

  const calcResultados = () => {
    setAcertos(calcularAcertos(mesa.jogadores, cashouts));
    setEncStep(2);
  };

  const marcarAcerto = (id, field, val) =>
    setAcertos(prev => prev.map(a => a.id !== id ? a : { ...a, [field]: val }));

  // BUG FIX: exportarExcel em try-catch — se o download falhar (iOS, CDN offline etc)
  // a mesa ainda é salva no histórico e encerrada corretamente
  const encerrarMesa = () => {
    const resultados = mesa.jogadores.map(j => {
      const totalPago = (j.buyin||0) + j.rebuys.reduce((s,r)=>s+r.valor,0);
      const saiu      = Number(cashouts[j.id]||0);
      return { id: j.id, nome: j.nome, totalPago, cashout: saiu, resultado: saiu - totalPago };
    });
    const registro = {
      ...mesa, cashouts, acertos, resultados,
      encerradaEm: new Date().toLocaleString("pt-BR"),
      totalGeral, rakeValor, caixinhaVal, potLiquido,
    };
    const novoHist = [registro, ...loadHistorico()];
    saveHistorico(novoHist);
    setHistorico(novoHist);
    try { exportarExcel({ ...mesa, cashouts, acertos }); } catch(e) {}
    persist(null);
    setEncStep(0);
    showToast("Mesa salva no histórico ✓");
  };

  // stats acumulados por jogador
  const statsJogadores = (() => {
    const map = {};
    historico.forEach(h => {
      (h.resultados || []).forEach(r => {
        if (!map[r.nome]) map[r.nome] = { nome: r.nome, partidas: 0, totalInvestido: 0, totalCashout: 0, resultado: 0 };
        map[r.nome].partidas++;
        map[r.nome].totalInvestido += r.totalPago  || 0;
        map[r.nome].totalCashout   += r.cashout    || 0;
        map[r.nome].resultado      += r.resultado  || 0;
      });
    });
    return Object.values(map).sort((a,b) => b.resultado - a.resultado);
  })();

  if (loading) return (
    <div style={{background:"#0B1A0D",minHeight:"100vh",display:"flex",
      alignItems:"center",justifyContent:"center",color:"#4A7A4A",
      fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:2}}>
      CARREGANDO...
    </div>
  );

  return (
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* ── TOP BAR ── */}
        <div className="top-bar">
          <div className="top-logo">
            POKER MAHAU
            <small>{mesa ? `MESA · ${mesa.data}` : "MESA AO VIVO"}</small>
          </div>

          {mesa && rake.percent > 0 && (
            <div className="top-chips">
              <div className="top-chip rake">
                <div className="top-chip-label">Rake {rake.percent}%</div>
                <div className="top-chip-val">{fmtBRL(rakeValor)}</div>
              </div>
              {caixinhaVal > 0 && (
                <div className="top-chip caix">
                  <div className="top-chip-label">Caixinha</div>
                  <div className="top-chip-val">{fmtBRL(caixinhaVal)}</div>
                </div>
              )}
              <div className="top-chip">
                <div className="top-chip-label">Pote</div>
                <div className="top-chip-val">{fmtBRL(potLiquido)}</div>
              </div>
            </div>
          )}

          <div className="top-actions">
            {/* Histórico — SEMPRE visível */}
            <button className="top-btn" onClick={() => setShowHist(true)}>
              {historico.length > 0 ? `hist.(${historico.length})` : "histórico"}
            </button>
            {/* Nova Mesa — só quando há mesa ativa */}
            {mesa && (
              <button className="top-btn danger" onClick={() => setConfirmNovaMesa(true)}>
                nova mesa
              </button>
            )}
            {mesa && (
              <div className="top-right">
                <div className="top-right-label">Total</div>
                <div className="top-right-val">{fmtBRL(totalGeral)}</div>
                <div className="top-right-sub">{numJog} jog.</div>
              </div>
            )}
          </div>
        </div>

        {/* ── SETUP ── */}
        {!mesa && (
          <div className="setup">
            <div>
              <div className="setup-title">MESA<br/>AO VIVO</div>
              <div className="setup-sub">Poker Mahau · Controle em tempo real</div>
            </div>
            <div className="setup-card">
              <div>
                <div className="field-label">Data da Mesa</div>
                <input className="field-input" value={setupData.data}
                  onChange={e => setSetupData({...setupData, data: e.target.value})} />
              </div>
              <div className="field-row">
                <div>
                  <div className="field-label">Rake (%)</div>
                  <input className="field-input" type="number" min="0" max="30"
                    value={setupData.rakePercent} placeholder="5"
                    onChange={e => setSetupData({...setupData, rakePercent: e.target.value})} />
                </div>
                <div>
                  <div className="field-label">Caixinha (R$)</div>
                  <input className="field-input" type="number" min="0"
                    value={setupData.caixinha} placeholder="0"
                    onChange={e => setSetupData({...setupData, caixinha: e.target.value})} />
                </div>
              </div>
              <button className="btn-gold" onClick={iniciarMesa}>INICIAR MESA</button>
            </div>
          </div>
        )}

        {/* ── MESA ATIVA ── */}
        {mesa && (
          <>
            <div className="main">

              {/* Banner rake */}
              {rake.percent > 0 && totalGeral > 0 && (
                <div className="rake-banner">
                  <div className="rake-banner-col">
                    <div className="rake-banner-lbl" style={{color:"#E86060"}}>Rake {rake.percent}%</div>
                    <div className="rake-banner-val" style={{color:"#E86060"}}>{fmtBRL(rakeValor)}</div>
                  </div>
                  <div className="rake-banner-col" style={{alignItems:"center"}}>
                    <div className="rake-banner-lbl" style={{color:"#4A7A4A"}}>Pote líquido</div>
                    <div className="rake-banner-val" style={{color:"#F0D080"}}>{fmtBRL(potLiquido)}</div>
                  </div>
                  {caixinhaVal > 0 && (
                    <div className="rake-banner-col" style={{alignItems:"flex-end"}}>
                      <div className="rake-banner-lbl" style={{color:"#60AABB"}}>Caixinha</div>
                      <div className="rake-banner-val" style={{color:"#60AABB"}}>{fmtBRL(caixinhaVal)}</div>
                    </div>
                  )}
                </div>
              )}

              {/* Banner encerrar — sempre visível */}
              <div className="encerrar-banner" onClick={abrirEncerrar}>
                <div>
                  <div className="encerrar-banner-label">Fim de jogo</div>
                  <div className="encerrar-banner-title">ENCERRAR / CASHOUT</div>
                  <div className="encerrar-banner-sub">Registra resultados e acertos entre jogadores</div>
                </div>
                <div className="encerrar-banner-arrow">›</div>
              </div>

              {mesa.jogadores.length === 0 && (
                <div className="empty-state">
                  <span>♠</span>
                  <div>Adicione os jogadores abaixo</div>
                </div>
              )}

              {mesa.jogadores.map(j => {
                const totalJ   = (j.buyin||0) + j.rebuys.reduce((s,r)=>s+r.valor,0);
                const isExp    = expanded === j.id;
                const temBuyin = j.buyin > 0;

                return (
                  <div key={j.id} className={`player-card ${isExp ? "expanded" : ""}`}>
                    <div className="player-head" onClick={() => setExpanded(isExp ? null : j.id)}>
                      <div className="player-left">
                        <div className="player-name">{j.nome}</div>
                        <div className="player-meta">
                          {temBuyin
                            ? `buy-in ${fmtBRL(j.buyin)} · ${j.rebuys.length} rebuy${j.rebuys.length!==1?"s":""}`
                            : "aguardando buy-in..."}
                        </div>
                      </div>
                      <div className="player-right">
                        <div className="player-total">{fmtBRL(totalJ)}</div>
                        <div className="player-pago">{isExp ? "fechar ▲" : "ver ▼"}</div>
                      </div>
                    </div>

                    {!isExp && (j.buyin > 0 || j.rebuys.length > 0) && (
                      <div className="player-pills">
                        {j.buyin > 0 && (
                          <span className="pill pill-buyin">
                            buy-in {fmtBRL(j.buyin)}<span className="pill-forma">{j.buyinForma}</span>
                          </span>
                        )}
                        {j.rebuys.map(r => (
                          <span key={r.id} className="pill pill-rebuy">
                            rebuy {fmtBRL(r.valor)}<span className="pill-forma">{r.forma}</span>
                          </span>
                        ))}
                      </div>
                    )}

                    {isExp && (
                      <div className="player-body">
                        <div>
                          <div className="sec-label">
                            {temBuyin ? `✓ Buy-in: ${fmtBRL(j.buyin)} · ${j.buyinForma}` : "Buy-in"}
                          </div>
                          {!temBuyin && (
                            <>
                              <div className="quick-btns" style={{marginBottom:8}}>
                                {BUYINS.map(v => (
                                  <button key={v}
                                    className={`quick-btn ${selectedBuyin===v?"selected":""}`}
                                    onClick={() => { setSelectedBuyin(v); setCustomBuyin(""); }}>
                                    {fmtBRL(v)}
                                  </button>
                                ))}
                                <button
                                  className={`quick-btn ${selectedBuyin==="custom"?"selected":""}`}
                                  onClick={() => setSelectedBuyin("custom")}>
                                  Outro
                                </button>
                              </div>
                              {selectedBuyin === "custom" && (
                                <div className="custom-val" style={{marginBottom:8}}>
                                  <input className="custom-input" type="number"
                                    value={customBuyin} placeholder="Valor personalizado"
                                    onChange={e => setCustomBuyin(e.target.value)} />
                                </div>
                              )}
                              <div className="sec-label" style={{marginBottom:6}}>Forma de pagamento</div>
                              <div className="forma-btns" style={{marginBottom:10}}>
                                {FORMAS.map(f => (
                                  <button key={f}
                                    className={`forma-btn ${buyinForma===f?"selected":""}`}
                                    onClick={() => setBuyinForma(f)}>{f}</button>
                                ))}
                              </div>
                              <button className="confirm-btn gold" style={{width:"100%"}}
                                onClick={() => confirmarBuyin(j.id)}>
                                CONFIRMAR BUY-IN
                              </button>
                            </>
                          )}
                        </div>

                        <div>
                          <div className="sec-label">+ Rebuy</div>
                          <div className="quick-btns" style={{marginBottom:8}}>
                            {REBUYS.map(v => (
                              <button key={v}
                                className={`quick-btn ${Number(rebuyVal)===v?"selected":""}`}
                                onClick={() => setRebuyVal(String(v))}>
                                {fmtBRL(v)}
                              </button>
                            ))}
                          </div>
                          <div className="sec-label" style={{marginBottom:6}}>Forma de pagamento</div>
                          <div className="forma-btns" style={{marginBottom:10}}>
                            {FORMAS.map(f => (
                              <button key={f}
                                className={`forma-btn ${rebuyForma===f?"selected":""}`}
                                onClick={() => setRebuyForma(f)}>{f}</button>
                            ))}
                          </div>
                          <div className="custom-val">
                            <input className="custom-input" type="number"
                              value={rebuyVal} placeholder="Valor do rebuy"
                              onChange={e => setRebuyVal(e.target.value)} />
                            <button className="confirm-btn" onClick={() => addRebuy(j.id)}>
                              + REBUY
                            </button>
                          </div>
                        </div>

                        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                          {mesa.jogadores.length > 0 && (
                            <button className="btn-excel" onClick={() => exportarExcel(mesa)}>
                              ⬇ Planilha
                            </button>
                          )}
                          <button className="btn-red" onClick={() => remJogador(j.id)}>
                            Remover
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="add-bar">
              <div className="add-row">
                <input className="add-input" value={addName}
                  onChange={e => setAddName(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && addJogador()}
                  placeholder="Nome do jogador..." />
                <button className="add-btn" onClick={addJogador}>+ ADD</button>
              </div>
            </div>
          </>
        )}

        {/* ── ENCERRAR STEP 1: CASHOUT ── */}
        {encStep === 1 && mesa && (
          <div className="overlay" onClick={() => setEncStep(0)}>
            <div className="bottom-sheet" onClick={e => e.stopPropagation()}>
              <div className="steps">
                <div className="step-dot active"></div>
                <div className="step-dot"></div>
                <div className="step-dot"></div>
              </div>
              <div className="sheet-title">CASHOUT</div>
              <div style={{fontSize:9,color:"#4A7A4A",letterSpacing:1,textAlign:"center"}}>
                Quanto cada jogador saiu com?
              </div>

              {rake.percent > 0 && (
                <div className="info-row rake">
                  <span className="info-lbl">Rake {rake.percent}%</span>
                  <span className="info-val">− {fmtBRL(rakeValor)}</span>
                </div>
              )}
              {caixinhaVal > 0 && (
                <div className="info-row caix">
                  <span className="info-lbl">Caixinha</span>
                  <span className="info-val">− {fmtBRL(caixinhaVal)}</span>
                </div>
              )}
              <div className="info-row">
                <span className="info-lbl">Pote a distribuir</span>
                <span className="info-val">{fmtBRL(potLiquido)}</span>
              </div>

              {mesa.jogadores.length === 0 && (
                <div style={{textAlign:"center",color:"#4A7A4A",fontSize:10,padding:"12px 0",letterSpacing:1}}>
                  Nenhum jogador na mesa
                </div>
              )}

              {mesa.jogadores.map(j => {
                const totalPago = (j.buyin||0) + j.rebuys.reduce((s,r)=>s+r.valor,0);
                return (
                  <div key={j.id} className="cashout-row">
                    <div style={{flex:1}}>
                      <div className="cashout-name">{j.nome}</div>
                      <div className="cashout-sub">investiu {fmtBRL(totalPago)}</div>
                    </div>
                    <input className="cashout-input" type="number" placeholder="0"
                      value={cashouts[j.id] || ""}
                      onChange={e => setCashouts(prev => ({...prev, [j.id]: e.target.value}))} />
                  </div>
                );
              })}

              {totalCO > 0 && (
                <div className={Math.abs(diffCO) < 1 ? "diff-ok" : "diff-warn"}>
                  {Math.abs(diffCO) < 1
                    ? "✓ Cashouts batem com o pote"
                    : `Diferença de ${fmtBRL(Math.abs(diffCO))} em relação ao pote`}
                </div>
              )}

              <button className="btn-gold" onClick={calcResultados}>VER RESULTADOS →</button>
              <button className="btn-outline" onClick={() => setEncStep(0)}>Cancelar</button>
            </div>
          </div>
        )}

        {/* ── ENCERRAR STEP 2: RESULTADOS + ACERTOS ── */}
        {encStep === 2 && mesa && (
          <div className="overlay" onClick={() => setEncStep(1)}>
            <div className="bottom-sheet" onClick={e => e.stopPropagation()}>
              <div className="steps">
                <div className="step-dot done"></div>
                <div className="step-dot active"></div>
                <div className="step-dot"></div>
              </div>
              <div className="sheet-title">RESULTADOS</div>

              {mesa.jogadores.map(j => {
                const totalPago = (j.buyin||0) + j.rebuys.reduce((s,r)=>s+r.valor,0);
                const saiu      = Number(cashouts[j.id]||0);
                const saldo     = saiu - totalPago;
                const cls       = saldo > 0 ? "pos" : saldo < 0 ? "neg" : "zero";
                return (
                  <div key={j.id} className="resultado-row">
                    <div>
                      <div className="resultado-nome">{j.nome}</div>
                      <div className="resultado-sub">inv. {fmtBRL(totalPago)} → saiu {fmtBRL(saiu)}</div>
                    </div>
                    <div className={`resultado-saldo ${cls}`}>
                      {saldo >= 0 ? "+" : ""}{fmtBRL(saldo)}
                    </div>
                  </div>
                );
              })}

              {rake.percent > 0 && (
                <div className="info-row rake" style={{marginTop:4}}>
                  <span className="info-lbl">Rake {rake.percent}%</span>
                  <span className="info-val">{fmtBRL(rakeValor)}</span>
                </div>
              )}
              {caixinhaVal > 0 && (
                <div className="info-row caix">
                  <span className="info-lbl">Caixinha</span>
                  <span className="info-val">{fmtBRL(caixinhaVal)}</span>
                </div>
              )}

              <div style={{borderTop:"1px solid #1E4020",paddingTop:10}}>
                <div style={{fontSize:8,color:"#7A6228",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>
                  Acertos — quem paga quem
                </div>
                {acertos.length === 0 && (
                  <div style={{fontSize:10,color:"#4A7A4A",letterSpacing:1,textAlign:"center",padding:"8px 0"}}>
                    Ninguém deve nada a ninguém
                  </div>
                )}
                {acertos.map(a => (
                  <div key={a.id} className={`acerto-card ${a.pago ? "pago" : ""}`} style={{marginBottom:8}}>
                    <div className="acerto-top">
                      <div className="acerto-names">
                        <div className="acerto-de">{a.de}</div>
                        <div className="acerto-seta">▶ paga</div>
                        <div className="acerto-para">{a.para}</div>
                      </div>
                      <div className="acerto-val">{fmtBRL(a.valor)}</div>
                    </div>
                    {!a.pago ? (
                      <div className="acerto-ctrl">
                        <div style={{display:"flex",gap:4}}>
                          {FORMAS.map(f => (
                            <button key={f}
                              className={`acerto-forma-btn ${a.forma===f?"selected":""}`}
                              onClick={() => marcarAcerto(a.id,"forma",f)}>
                              {f}
                            </button>
                          ))}
                        </div>
                        <button className="acerto-pago-btn"
                          onClick={() => marcarAcerto(a.id,"pago",true)}>
                          ✓ PAGO
                        </button>
                      </div>
                    ) : (
                      <div className="acerto-badge">✓ pago via {a.forma}</div>
                    )}
                  </div>
                ))}
              </div>

              <button className="btn-gold" onClick={encerrarMesa}>SALVAR E ENCERRAR MESA</button>
              <button className="btn-outline" onClick={() => setEncStep(1)}>← Voltar ao cashout</button>
            </div>
          </div>
        )}

        {/* ── HISTÓRICO ── */}
        {showHist && (
          <div className="overlay" onClick={() => setShowHist(false)}>
            <div className="bottom-sheet" onClick={e => e.stopPropagation()}>
              <div className="sheet-title">HISTÓRICO</div>
              <div className="tab-bar">
                <div className={`tab ${histTab==="mesas"?"active":""}`}
                  onClick={() => setHistTab("mesas")}>Mesas</div>
                <div className={`tab ${histTab==="jogadores"?"active":""}`}
                  onClick={() => setHistTab("jogadores")}>Jogadores</div>
              </div>

              {histTab === "mesas" && (
                <div>
                  {historico.length === 0 && (
                    <div style={{textAlign:"center",color:"#4A7A4A",fontSize:11,padding:"32px 0",letterSpacing:1}}>
                      Nenhuma mesa encerrada ainda.<br/>
                      <span style={{fontSize:9,display:"block",marginTop:8}}>
                        Encerre uma mesa para ver o histórico aqui.
                      </span>
                    </div>
                  )}
                  {historico.map((h, i) => {
                    const tB = h.jogadores.reduce((s,j)=>s+(j.buyin||0),0);
                    const tR = h.jogadores.reduce((s,j)=>s+j.rebuys.reduce((sr,r)=>sr+r.valor,0),0);
                    return (
                      <div key={i} className="hist-block">
                        <div className="hist-header">
                          <span className="hist-date">{h.data}</span>
                          <span className="hist-total">{fmtBRL(h.totalGeral)}</span>
                        </div>
                        <div className="hist-grid">
                          {[["Jogadores",h.jogadores.length],["Buy-in",fmtBRL(tB)],["Rebuy",fmtBRL(tR)]].map(([l,v])=>(
                            <div key={l} className="hist-cell">
                              <div className="hist-cell-lbl">{l}</div>
                              <div className="hist-cell-val">{v}</div>
                            </div>
                          ))}
                        </div>
                        {h.resultados && h.resultados.map(r => (
                          <div key={r.id || r.nome} className="hist-res-row">
                            <span className="hist-res-nome">{r.nome}</span>
                            <span className={`hist-res-val ${r.resultado>0?"pos":r.resultado<0?"neg":""}`}>
                              {r.resultado>=0?"+":""}{fmtBRL(r.resultado)}
                            </span>
                          </div>
                        ))}
                        {h.rakeValor > 0 && (
                          <div style={{fontSize:8,color:"#E86060",letterSpacing:1,marginTop:6}}>
                            rake {fmtBRL(h.rakeValor)}{h.caixinhaVal>0?` · caixinha ${fmtBRL(h.caixinhaVal)}`:""}
                          </div>
                        )}
                        <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}>
                          <button onClick={() => { try { exportarExcel(h); } catch(e) { showToast("Erro ao exportar"); } }}
                            style={{background:"#0A200A",border:"1px solid #1A5A1A",color:"#5ABB5A",
                              fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1,
                              textTransform:"uppercase",padding:"6px 12px",cursor:"pointer",borderRadius:2}}>
                            ⬇ re-exportar
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {histTab === "jogadores" && (
                <div>
                  {statsJogadores.length === 0 && (
                    <div style={{textAlign:"center",color:"#4A7A4A",fontSize:11,padding:"32px 0",letterSpacing:1}}>
                      Nenhum dado ainda.<br/>
                      <span style={{fontSize:9,display:"block",marginTop:8}}>
                        Complete mesas com cashout para ver stats aqui.
                      </span>
                    </div>
                  )}
                  {statsJogadores.map(s => (
                    <div key={s.nome} className="jogador-stat">
                      <div className="jogador-stat-header">
                        <span className="jogador-stat-nome">{s.nome}</span>
                        <span className={`jogador-stat-res ${s.resultado>0?"pos":s.resultado<0?"neg":"zero"}`}>
                          {s.resultado>=0?"+":""}{fmtBRL(s.resultado)}
                        </span>
                      </div>
                      <div className="hist-grid">
                        {[["Partidas",s.partidas],["Investido",fmtBRL(s.totalInvestido)],["Cashout",fmtBRL(s.totalCashout)]].map(([l,v])=>(
                          <div key={l} className="hist-cell">
                            <div className="hist-cell-lbl">{l}</div>
                            <div className="hist-cell-val">{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <button className="btn-outline" onClick={() => setShowHist(false)}>Fechar</button>
            </div>
          </div>
        )}

        {/* ── CONFIRMAR NOVA MESA (abandona mesa ativa) ── */}
        {confirmNovaMesa && (
          <div className="confirm-modal">
            <div className="confirm-box">
              <div className="confirm-icon">♠</div>
              <div className="confirm-title">Nova Mesa?</div>
              <div className="confirm-name">
                A mesa atual será descartada sem salvar.
              </div>
              <div className="confirm-sub">Para salvar o histórico, encerre pelo cashout</div>
              <div className="confirm-btns">
                <button className="btn-red" style={{width:"100%",padding:"12px",fontSize:12}}
                  onClick={novaMesa}>
                  Descartar e criar nova
                </button>
                <button className="btn-outline" style={{width:"100%",padding:"12px"}}
                  onClick={() => setConfirmNovaMesa(false)}>
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── CONFIRMAR REMOÇÃO DE JOGADOR ── */}
        {confirmRemove && (
          <div className="confirm-modal">
            <div className="confirm-box">
              <div className="confirm-icon">⚠️</div>
              <div className="confirm-title">Remover jogador?</div>
              <div className="confirm-name">{confirmRemove.nome}</div>
              <div className="confirm-sub">Essa ação não pode ser desfeita</div>
              <div className="confirm-btns">
                <button className="btn-red" style={{width:"100%",padding:"12px",fontSize:12}}
                  onClick={confirmarRemocao}>Sim, remover</button>
                <button className="btn-outline" style={{width:"100%",padding:"12px"}}
                  onClick={() => setConfirmRemove(null)}>Cancelar</button>
              </div>
            </div>
          </div>
        )}

        {toast && <div className="toast">{toast}</div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
