<script type="text/babel">
const { useState, useEffect } = React;

// ── Storage (localStorage) ─────────────────────────────────────────────────
const KEY = "poker-live-v1";
const HIST_KEY = "poker-mahau-historico";
function loadHistorico() {
  try { const v = localStorage.getItem(HIST_KEY); return v ? JSON.parse(v) : []; }
  catch { return []; }
}
function saveHistorico(h) {
  try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch {}
}
function loadMesa() {
  try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }
  catch { return null; }
}
function saveMesa(data) {
  try {
    if (data === null) localStorage.removeItem(KEY);
    else localStorage.setItem(KEY, JSON.stringify(data));
  } catch {}
}

const BUYINS = [300, 500, 1000];
const REBUYS = [300, 500, 1000, 1500, 2000];

// ── Exportar Excel ─────────────────────────────────────────────────────────
function exportarExcel(mesa) {
  const rows = mesa.jogadores.map(j => {
    const totalRebuy  = j.rebuys.reduce((s, r) => s + r.valor, 0);
    const formasRebuy = [...new Set(j.rebuys.map(r => r.forma))].join(", ") || "—";
    return {
      "Jogador":          j.nome,
      "Buy-in (R$)":      j.buyin || 0,
      "Forma Buy-in":     j.buyinForma || "—",
      "Total Rebuy (R$)": totalRebuy,
      "Qtd Rebuys":       j.rebuys.length,
      "Forma(s) Rebuy":   formasRebuy,
      "Total Pago (R$)":  (j.buyin || 0) + totalRebuy,
    };
  });
  const totalBuyin = mesa.jogadores.reduce((s, j) => s + (j.buyin || 0), 0);
  const totalRebuy = mesa.jogadores.reduce((s, j) =>
    s + j.rebuys.reduce((sr, r) => sr + r.valor, 0), 0);
  rows.push({
    "Jogador": "TOTAL", "Buy-in (R$)": totalBuyin, "Forma Buy-in": "",
    "Total Rebuy (R$)": totalRebuy, "Qtd Rebuys": "", "Forma(s) Rebuy": "",
    "Total Pago (R$)": totalBuyin + totalRebuy,
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws["!cols"] = [20,14,16,18,12,18,16].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Controle Mesa");
  XLSX.writeFile(wb, `PokerMahau_${mesa.data.replace(/\//g, "-")}.xlsx`);
}

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [mesa, setMesa]       = useState(null);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [addName, setAddName]  = useState("");
  const [toast, setToast]      = useState(null);
  const [showFim, setShowFim]  = useState(false);
  const [historico, setHistorico] = useState([]);
  const [showHist, setShowHist] = useState(false);
  const [confirmRemove, setConfirmRemove] = useState(null); // {id, nome}
  const [setupData, setSetupData] = useState({
    data: new Date().toLocaleDateString("pt-BR"),
  });

  // estados do painel
  const [rebuyVal, setRebuyVal]     = useState("");
  const [rebuyForma, setRebuyForma] = useState("Pix");
  const [buyinForma, setBuyinForma] = useState("Pix");
  const [customBuyin, setCustomBuyin] = useState("");
  const [selectedBuyin, setSelectedBuyin] = useState(null);

  useEffect(() => {
    const d = loadMesa();
    if (d) setMesa(d);
    setHistorico(loadHistorico());
    setLoading(false);
  }, []);

  const persist = (m) => { setMesa(m); saveMesa(m); };
  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 1800); };

  const iniciarMesa = () => {
    const m = { id: uid(), data: setupData.data, jogadores: [] };
    persist(m); showToast("Mesa iniciada ✓");
  };

  const addJogador = () => {
    const nome = addName.trim();
    if (!nome) return;
    const j = { id: uid(), nome, buyin: 0, buyinForma: "Pix", rebuys: [] };
    const m = { ...mesa, jogadores: [...mesa.jogadores, j] };
    persist(m); setAddName("");
    setExpanded(j.id); setSelectedBuyin(null); setCustomBuyin(""); setBuyinForma("Pix");
  };

  const confirmarBuyin = (jId) => {
    const val = selectedBuyin === "custom" ? Number(customBuyin) : selectedBuyin;
    if (!val) return;
    persist({ ...mesa, jogadores: mesa.jogadores.map(j =>
      j.id !== jId ? j : { ...j, buyin: val, buyinForma }
    )});
    showToast(`Buy-in ${fmtBRL(val)} · ${buyinForma} ✓`);
    setSelectedBuyin(null); setCustomBuyin("");
  };

  const addRebuy = (jId) => {
    const val = Number(rebuyVal);
    if (!val) return;
    const rebuy = { id: uid(), valor: val, forma: rebuyForma };
    persist({ ...mesa, jogadores: mesa.jogadores.map(j =>
      j.id !== jId ? j : { ...j, rebuys: [...j.rebuys, rebuy] }
    )});
    setRebuyVal(""); showToast(`Rebuy ${fmtBRL(val)} · ${rebuyForma} ✓`);
  };

  const remJogador = (jId) => {
    const j = mesa.jogadores.find(j => j.id === jId);
    setConfirmRemove({ id: jId, nome: j ? j.nome : "este jogador" });
  };
  const confirmarRemocao = () => {
    persist({ ...mesa, jogadores: mesa.jogadores.filter(j => j.id !== confirmRemove.id) });
    if (expanded === confirmRemove.id) setExpanded(null);
    setConfirmRemove(null);
    showToast("Jogador removido");
  };

  const encerrarMesa = () => {
    exportarExcel(mesa);
    // salva no histórico
    const registro = {
      ...mesa,
      encerradaEm: new Date().toLocaleString("pt-BR"),
      totalGeral: mesa.jogadores.reduce((s,j)=>s+(j.buyin||0)+j.rebuys.reduce((sr,r)=>sr+r.valor,0),0),
    };
    const novoHist = [registro, ...loadHistorico()];
    saveHistorico(novoHist);
    setHistorico(novoHist);
    persist(null); setShowFim(false); showToast("Mesa salva no histórico ✓");
  };

  const totalGeral  = mesa
    ? mesa.jogadores.reduce((s, j) =>
        s + (j.buyin || 0) + j.rebuys.reduce((sr, r) => sr + r.valor, 0), 0) : 0;
  const numJogadores = mesa ? mesa.jogadores.length : 0;

  if (loading) return (
    <div style={{background:"#0B1A0D",minHeight:"100dvh",display:"flex",
      alignItems:"center",justifyContent:"center",color:"#4A7A4A",
      fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:2}}>
      CARREGANDO...
    </div>
  );

  return (
    <>
      <style>{CSS}</style>
      <div className="app">

        {/* TOPO */}
        <div className="top-bar">
          <div className="top-logo">
            POKER MAHAU
            <small>{mesa ? `MESA · ${mesa.data}` : "MESA AO VIVO"}</small>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {historico.length > 0 && (
              <button onClick={()=>setShowHist(true)}
                style={{background:"none",border:"1px solid #1E4020",color:"#4A7A4A",
                  fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1,
                  textTransform:"uppercase",padding:"6px 10px",cursor:"pointer",borderRadius:2}}>
                hist. ({historico.length})
              </button>
            )}
          </div>
          {mesa && (
            <div className="top-total">
              <div className="top-total-label">Total em Mesa</div>
              <div className="top-total-val">{fmtBRL(totalGeral)}</div>
              <div className="top-total-sub">{numJogadores} jogador{numJogadores !== 1 ? "es" : ""}</div>
            </div>
          )}
        </div>

        {/* SETUP */}
        {!mesa && (
          <div className="setup">
            <div>
              <div className="setup-title">MESA<br/>AO VIVO</div>
              <div className="setup-sub">Poker Mahau · Controle em tempo real</div>
            </div>
            <div className="setup-card">
              <div>
                <div className="field-label">Data da Mesa</div>
                <input className="field-input" value={setupData.data}
                  onChange={e => setSetupData({...setupData, data: e.target.value})} />
              </div>
              <button className="btn-gold" onClick={iniciarMesa}>INICIAR MESA</button>
            </div>
          </div>
        )}

        {/* LISTA JOGADORES */}
        {mesa && (
          <>
            <div className="main">
              {mesa.jogadores.length === 0 && (
                <div className="empty-state">
                  <span>♠</span>
                  <div>Adicione os jogadores abaixo</div>
                </div>
              )}

              {mesa.jogadores.map(j => {
                const totalJ = (j.buyin || 0) + j.rebuys.reduce((s, r) => s + r.valor, 0);
                const isExp  = expanded === j.id;
                const temBuyin = j.buyin > 0;

                return (
                  <div key={j.id} className={`player-card ${isExp ? "expanded" : ""}`}>
                    <div className="player-head" onClick={() => setExpanded(isExp ? null : j.id)}>
                      <div className="player-left">
                        <div className="player-name">{j.nome}</div>
                        <div className="player-meta">
                          {temBuyin
                            ? `buy-in ${fmtBRL(j.buyin)} · ${j.rebuys.length} rebuy${j.rebuys.length !== 1 ? "s" : ""}`
                            : "aguardando buy-in..."}
                        </div>
                      </div>
                      <div className="player-right">
                        <div className="player-total">{fmtBRL(totalJ)}</div>
                        <div className="player-pago">{isExp ? "fechar ▲" : "ver ▼"}</div>
                      </div>
                    </div>

                    {!isExp && (j.buyin > 0 || j.rebuys.length > 0) && (
                      <div className="player-pills">
                        {j.buyin > 0 && (
                          <span className="pill pill-buyin">
                            buy-in {fmtBRL(j.buyin)}
                            <span className="pill-forma">{j.buyinForma}</span>
                          </span>
                        )}
                        {j.rebuys.map(r => (
                          <span key={r.id} className="pill pill-rebuy">
                            rebuy {fmtBRL(r.valor)}
                            <span className="pill-forma">{r.forma}</span>
                          </span>
                        ))}
                      </div>
                    )}

                    {isExp && (
                      <div className="player-body">

                        {/* BUY-IN */}
                        <div>
                          <div className="sec-label">
                            {temBuyin ? `✓ Buy-in: ${fmtBRL(j.buyin)} · ${j.buyinForma}` : "Buy-in"}
                          </div>
                          {!temBuyin && (
                            <>
                              <div className="quick-btns" style={{marginBottom:8}}>
                                {BUYINS.map(v => (
                                  <button key={v}
                                    className={`quick-btn ${selectedBuyin === v ? "selected" : ""}`}
                                    onClick={() => { setSelectedBuyin(v); setCustomBuyin(""); }}>
                                    {fmtBRL(v)}
                                  </button>
                                ))}
                                <button
                                  className={`quick-btn ${selectedBuyin === "custom" ? "selected" : ""}`}
                                  onClick={() => setSelectedBuyin("custom")}>
                                  Outro
                                </button>
                              </div>
                              {selectedBuyin === "custom" && (
                                <div className="custom-val" style={{marginBottom:8}}>
                                  <input className="custom-input" type="number"
                                    value={customBuyin} placeholder="Valor personalizado"
                                    onChange={e => setCustomBuyin(e.target.value)} />
                                </div>
                              )}
                              <div className="sec-label" style={{marginBottom:6}}>Forma de pagamento</div>
                              <div className="forma-btns" style={{marginBottom:10}}>
                                {FORMAS.map(f => (
                                  <button key={f}
                                    className={`forma-btn ${buyinForma === f ? "selected" : ""}`}
                                    onClick={() => setBuyinForma(f)}>
                                    {f}
                                  </button>
                                ))}
                              </div>
                              <button className="confirm-btn gold" style={{width:"100%"}}
                                onClick={() => confirmarBuyin(j.id)}>
                                CONFIRMAR BUY-IN
                              </button>
                            </>
                          )}
                        </div>

                        {/* REBUY */}
                        <div>
                          <div className="sec-label">+ Rebuy</div>
                          <div className="quick-btns" style={{marginBottom:8}}>
                            {REBUYS.map(v => (
                              <button key={v}
                                className={`quick-btn ${Number(rebuyVal) === v ? "selected" : ""}`}
                                onClick={() => setRebuyVal(String(v))}>
                                {fmtBRL(v)}
                              </button>
                            ))}
                          </div>
                          <div className="sec-label" style={{marginBottom:6}}>Forma de pagamento</div>
                          <div className="forma-btns" style={{marginBottom:10}}>
                            {FORMAS.map(f => (
                              <button key={f}
                                className={`forma-btn ${rebuyForma === f ? "selected" : ""}`}
                                onClick={() => setRebuyForma(f)}>
                                {f}
                              </button>
                            ))}
                          </div>
                          <div className="custom-val">
                            <input className="custom-input" type="number"
                              value={rebuyVal} placeholder="Valor do rebuy"
                              onChange={e => setRebuyVal(e.target.value)} />
                            <button className="confirm-btn" onClick={() => addRebuy(j.id)}>
                              + REBUY
                            </button>
                          </div>
                        </div>

                        {/* Remover */}
                        <div style={{display:"flex",justifyContent:"flex-end"}}>
                          <button className="btn-red" onClick={() => remJogador(j.id)}>
                            Remover jogador
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}

              {mesa.jogadores.length > 0 && (
                <div className="bottom-actions">
                  <button className="btn-excel" onClick={() => exportarExcel(mesa)}>
                    ⬇ Baixar Planilha
                  </button>
                  <button className="btn-red" onClick={() => setShowFim(true)}>
                    Encerrar Mesa
                  </button>
                </div>
              )}
            </div>

            {/* ADD BAR */}
            <div className="add-bar">
              <div className="add-row">
                <input className="add-input" value={addName}
                  onChange={e => setAddName(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addJogador()}
                  placeholder="Nome do jogador..." />
                <button className="add-btn" onClick={addJogador}>+ ADD</button>
              </div>
            </div>
          </>
        )}

        {/* ENCERRAR PANEL */}
        {showFim && (
          <div className="overlay" onClick={() => setShowFim(false)}>
            <div className="bottom-sheet" onClick={e => e.stopPropagation()}>
              <div className="sheet-title">ENCERRAR MESA</div>
              <div className="sheet-row">
                <span className="sheet-label">Data</span>
                <span className="sheet-val">{mesa.data}</span>
              </div>
              <div className="sheet-row">
                <span className="sheet-label">Jogadores</span>
                <span className="sheet-val">{numJogadores}</span>
              </div>
              <div className="sheet-row">
                <span className="sheet-label">Total em Mesa</span>
                <span className="sheet-val">{fmtBRL(totalGeral)}</span>
              </div>
              <div style={{fontSize:9,color:"#4A7A4A",letterSpacing:1,textAlign:"center"}}>
                A planilha Excel será baixada automaticamente
              </div>
              <button className="btn-gold" onClick={encerrarMesa}>
                CONFIRMAR E BAIXAR PLANILHA
              </button>
              <button className="btn-outline" onClick={() => setShowFim(false)}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* HISTÓRICO */}
        {showHist && (
          <div className="overlay" onClick={()=>setShowHist(false)}>
            <div className="bottom-sheet" style={{maxHeight:"80dvh",overflowY:"auto"}}
              onClick={e=>e.stopPropagation()}>
              <div className="sheet-title">HISTÓRICO</div>
              {historico.length === 0 && (
                <div style={{textAlign:"center",color:"#4A7A4A",fontSize:11,padding:"20px 0"}}>
                  Nenhuma mesa encerrada ainda
                </div>
              )}
              {historico.map((h,i) => {
                const totalBuyin = h.jogadores.reduce((s,j)=>s+(j.buyin||0),0);
                const totalRebuy = h.jogadores.reduce((s,j)=>s+j.rebuys.reduce((sr,r)=>sr+r.valor,0),0);
                return (
                  <div key={i} style={{borderBottom:"1px solid #1E4020",paddingBottom:14,marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#F0D080",letterSpacing:1}}>
                        {h.data}
                      </span>
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#C9A84C",letterSpacing:1}}>
                        {fmtBRL(h.totalGeral)}
                      </span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,marginBottom:8}}>
                      {[
                        ["Jogadores", h.jogadores.length],
                        ["Buy-in", fmtBRL(totalBuyin)],
                        ["Rebuy", fmtBRL(totalRebuy)],
                      ].map(([l,v])=>(
                        <div key={l} style={{background:"#091509",border:"1px solid #1E4020",padding:"6px 8px"}}>
                          <div style={{fontSize:7,color:"#4A7A4A",letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{l}</div>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:"#F0D080"}}>{v}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{fontSize:8,color:"#2E4A2E",letterSpacing:1}}>
                      {h.jogadores.map(j=>j.nome).join(" · ")}
                    </div>
                    <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}>
                      <button onClick={()=>exportarExcel(h)}
                        style={{background:"#0A200A",border:"1px solid #1A5A1A",color:"#5ABB5A",
                          fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:1,
                          textTransform:"uppercase",padding:"6px 12px",cursor:"pointer",borderRadius:2}}>
                        ⬇ re-exportar excel
                      </button>
                    </div>
                  </div>
                );
              })}
              <button className="btn-outline" onClick={()=>setShowHist(false)}>Fechar</button>
            </div>
          </div>
        )}

        {/* CONFIRMAÇÃO DE REMOÇÃO */}
        {confirmRemove && (
          <div className="confirm-modal">
            <div className="confirm-box">
              <div className="confirm-icon">⚠️</div>
              <div className="confirm-title">Remover jogador?</div>
              <div className="confirm-name">{confirmRemove.nome}</div>
              <div className="confirm-sub">Essa ação não pode ser desfeita</div>
              <div className="confirm-btns">
                <button className="btn-red" style={{width:"100%",padding:"12px",fontSize:12}}
                  onClick={confirmarRemocao}>
                  Sim, remover
                </button>
                <button className="btn-outline" style={{width:"100%",padding:"12px"}}
                  onClick={() => setConfirmRemove(null)}>
                  Cancelar
                </button>
              </div>
            </div>
          </div>
        )}

        {toast && <div className="toast">{toast}</div>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
